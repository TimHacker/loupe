name: Refresh feeds

# Runs every 2 hours. Idempotent — duplicate or skipped runs are harmless.
# Also doubles as a Supabase keepalive against the 7-day-inactivity pause.
#
# Configure SUPABASE_FUNCTION_URL and FUNCTION_SECRET as repo secrets before
# this workflow does anything useful. Until then it is a no-op stub.

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: POST to refresh-feeds Edge Function
        env:
          SUPABASE_FUNCTION_URL: ${{ secrets.SUPABASE_FUNCTION_URL }}
          FUNCTION_SECRET: ${{ secrets.FUNCTION_SECRET }}
        run: |
          if [ -z "$SUPABASE_FUNCTION_URL" ] || [ -z "$FUNCTION_SECRET" ]; then
            echo "Secrets not configured yet — skipping (this is fine pre-deploy)."
            exit 0
          fi
          response_file=$(mktemp)
          status=$(curl -sS -o "$response_file" -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $FUNCTION_SECRET" \
            -H "Content-Type: application/json" \
            "$SUPABASE_FUNCTION_URL")
          echo "Status: $status"
          cat "$response_file"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            exit 1
          fi
